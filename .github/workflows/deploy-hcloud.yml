name: Deploy HCloud Singapore

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: hcloud-singapore
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to hcloud Singapore
    runs-on: [self-hosted, Linux, X64, hcloud, singapore, chord]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: hcloud-singapore
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        shell: bash
        env:
          CHORD_APP_DIR: ${{ github.workspace }}
          GIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          CHORD_NEXT_PORT: ${{ secrets.CHORD_NEXT_PORT || '3010' }}
          CHORD_APP_URL: ${{ secrets.CHORD_APP_URL || '' }}
          CHORD_CADDY_DOMAIN: ${{ secrets.CHORD_CADDY_DOMAIN || 'chord.caorenyi.com' }}
          NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${{ secrets.NEXT_PUBLIC_ARC_TESTNET_RPC_URL || '' }}
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID || '' }}
          NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL: ${{ secrets.NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL || '' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
        run: |
          set -euo pipefail
          NEXT_PUBLIC_CHORD_NETWORK=arc bash deploy/hcloud/deploy.sh

      - name: Smoke public endpoint
        shell: bash
        env:
          CHORD_APP_URL: ${{ secrets.CHORD_APP_URL || '' }}
        run: |
          set -euo pipefail
          if [ -z "$CHORD_APP_URL" ]; then
            echo "CHORD_APP_URL not configured; remote deploy script already ran localhost smoke."
            exit 0
          fi
          curl -fsS --retry 12 --retry-delay 2 --retry-connrefused "$CHORD_APP_URL/projects" | grep -Fq "Contracts"
