services:
  web:
    build:
      context: ../..
      dockerfile: deploy/hcloud/Dockerfile
      args:
        NEXT_PUBLIC_CHORD_NETWORK: ${NEXT_PUBLIC_CHORD_NETWORK:-arc}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-}
        NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID:-}
        NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL: ${NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL:-}
        KIMI_API_KEY: ${KIMI_API_KEY:-}
    image: chord-arc:${CHORD_IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CHORD_NETWORK: ${NEXT_PUBLIC_CHORD_NETWORK:-arc}
      NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-}
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID:-}
      NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL: ${NEXT_PUBLIC_CHORD_AGENTS_REGISTRY_URL:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PORT: 3000
    ports:
      - "${CHORD_BIND_HOST:-0.0.0.0}:${CHORD_NEXT_PORT:-3010}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
